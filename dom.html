<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" class="ammountInput" id="price1" placeholder="Enter ammount">
    <input type="number" class="ammountInput" id="price2" placeholder="Enter ammount">
    <input type="number" class="ammountInput" id="price3" placeholder="Enter ammount">
    <input type="number" class="ammountInput" id="price4" placeholder="Enter ammount">
    <button id="submitBtn">Submit</button>
    <input type="number" id="total" placeholder="Total" readonly>


    <script>
        const prices = document.querySelectorAll(".ammountInput");
        const calculateBtn = document.querySelector('#submitBtn');
        const total = document.querySelector('#total');

        calculateBtn.addEventListener('click', () => {
            let sum = 0;
            for (let i = 0; i < prices.length; i++) {
                sum += Number(prices[i].value) || 0;
            }
            total.value = sum;
        });
    </script>
</body>
</html>
